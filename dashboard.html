<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexusED - Dashboard</title>
    <link rel="stylesheet" href="style.css"/>
</head>
<body class="dashboard-page">
    <div class="background-grid"></div>
    <div class="background-scanlines"></div>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-logo">
            <svg class="logo-icon-sm" viewBox="0 0 32 32" fill="none">
                <rect x="2" y="2" width="28" height="28" stroke="var(--accent)" stroke-width="1.5" />
                <path d="M8 16 L16 8 L24 16 L16 24 Z" stroke="var(--accent)" stroke-width="1.5" fill="none" />
                <circle cx="16" cy="16" r="2.5" fill="var(--accent)" />
            </svg>
            <span class="logo-text">NEXUSED</span>
        </div>

        <nav class="nav-links">
            <a href="#" class="nav-item active" data-section="overview">
                <span class="nav-icon">◈</span><span class="nav-label">OVERVIEW</span>
            </a>
            <a href="#" class="nav-item" data-section="grades">
                <span class="nav-icon">✏️</span><span class="nav-label">GRADES</span>
            </a>
            <a href="#" class="nav-item" data-section="schedule">
                <span class="nav-icon">📃</span><span class="nav-label">SCHEDULE</span>
            </a>
            <a href="#" class="nav-item" data-section="announcements">
                <span class="nav-icon">📢</span><span class="nav-label">NOTICES</span>
            </a>
        </nav>
        
        <div class="sidebar-profile" id="sidebarProfile">
            <div class="avatar" id="sidebarAvatar">--</div>
            <div class="profile-info">
                <p class="profile-name" id="sidebarName">Loading_</p>
                <p class="profile-srcode" id="profileSRCODE">SR-CODE: </p>
            </div>
        </div>

        <button class="logout-btn" id="logoutBTN">⏻ LOGOUT</button>
    </aside>

    <!-- Main Content -->
     <div class="dashboard-main">

        <!-- Top Bar -->
        <header class="topbar">
            <div class="topbar-left">
                <button class="menu-toggle" id="menuToggle">☰</button>
                <div class="breadcrumbs">
                    <span class="bc-root">NEXUS</span>
                    <span class="bc-separator">/</span>
                    <span class="bc-current" id="bcCurrent">OVERVIEW</span>
                </div>
            </div>

            <div class="topbar-right">
                <span class="status-dot"></span>
                <span class="status-label">Live</span>
                <span class="topbar-time" id="topbarTime">--:--</span>
            </div>
        </header>

        <div class="section-wrap">
            
        </div>
     </div>
</body>
</html>
